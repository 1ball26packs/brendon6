<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Petualangan Brendon</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #game-wrapper { width: 95%; max-width: 500px; height: 95vh; display: flex; flex-direction: column; align-items: center; justify-content: center;}

        .box { background: rgba(30, 30, 50, 0.95); border: 4px solid #fff; padding: 20px; width: 100%; border-radius: 15px; text-align: center; transition: 0.3s; }
        .hidden { display: none !important; }

        #loading-bar { width: 100%; border: 4px solid #fff; height: 26px; padding: 3px; margin-top: 25px; background: #000; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        #loading-bar-fill { height: 100%; background: #ffcc00; width: 0%; transition: width 0.1s ease; }

        #puzzle-container { display: grid; grid-template-columns: repeat(4, 1fr); width: 100%; aspect-ratio: 4/2; margin: 0 0 10px 0; border: 2px solid #fff; background: #111; }
        .tile { border: 1px solid #000; background-color: #333; }
        .revealed { background-image: url('siren2.png'); background-size: 400% 200%; animation: popReveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        #story-image-holder { width: 100%; border: 3px dashed #ffcc00; background: #222; margin: 5px 0 10px 0; border-radius: 8px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #story-image-holder img { width: 100%; height: 100%; object-fit: cover; }
        
        #story-text { font-size: 12px; line-height: 1.6; margin: 15px 0; min-height: 50px; }
        
        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        button { padding: 15px 5px; font-family: 'Press Start 2P', cursive; background: #ffcc00; border: none; cursor: pointer; font-size: 10px; border-radius: 5px; box-shadow: 0 4px 0 #cc9900; transition: transform 0.1s, box-shadow 0.1s; }
        button:active { background: #ffaa00; transform: translateY(4px); box-shadow: 0 0 0 #cc9900; }
        .action-btn { background: #00ccff; box-shadow: 0 4px 0 #0099cc; color: #fff; }
        .action-btn:active { background: #00aacc; box-shadow: 0 0 0 #0099cc; }

        .hud-box { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 10px 20px; background: rgba(20, 20, 30, 0.95); border: 3px solid #ffcc00; }
        #avatar { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; background: #222; transition: transform 0.3s; }
        .hud-info { text-align: right; }
        .hud-name { font-size: 9px; color: #ffcc00; margin-bottom: 5px; }
        #health { color: #ff3333; font-size: 16px; letter-spacing: 2px; }

        .popup-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .popup-overlay.show { opacity: 1; pointer-events: auto; }
        .popup-box { max-width: 350px; transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .popup-overlay.show .popup-box { transform: scale(1); }
        #popup-text { font-size: 11px; line-height: 1.6; margin-bottom: 20px; }

        @keyframes pulse { 0%, 100% { transform: scale(1); text-shadow: 0 0 5px #ffcc00; } 50% { transform: scale(1.05); text-shadow: 0 0 20px #ffcc00; } }
        @keyframes popReveal { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes neonGlow { 0%, 100% { text-shadow: 0 0 5px #0f0; } 50% { text-shadow: 0 0 20px #0f0; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .title-anim { animation: pulse 2s infinite; }
        .shake-anim { animation: shake 0.4s ease-in-out; border-color: #ff0000 !important; }
        .fade-in { animation: fadeInUp 0.4s ease-out forwards; }
        .win-glow { animation: neonGlow 1.5s infinite alternate; }
        .avatar-bounce { animation: bounce 0.4s ease-out; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="loading-screen" class="box">
        <h2 style="font-size: 14px; color: #ffcc00;">PREPARING MISSION...</h2>
        <div id="loading-bar"><div id="loading-bar-fill"></div></div>
        <p id="loading-text" style="font-size: 8px; margin-top: 15px; color: #aaa;">LOADING... 0%</p>
    </div>

    <div id="start-menu" class="box hidden">
        <h2 class="title-anim" style="font-size: 20px; color: #ffcc00;">SIREN<br>RESCUE</h2>
        <p style="font-size: 10px; margin-bottom: 30px;">Ini adalah Misi Spesial Brendon<br><br>Mari bantu saya untuk memperbaiki siren yang rusak agar bisa berfungsi normal kembali!</p>
        <button onclick="startGame()" style="font-size: 14px; padding: 20px;">PRESS START</button>
    </div>

    <div id="game-screen" class="box hidden">
        <div id="puzzle-container"></div>
        <div id="story-image-holder" class="hidden"></div>
        <div id="story-text"></div>
        <div id="choices" class="choices-grid"></div>
    </div>

    <div id="hud-screen" class="box hud-box hidden">
        <img id="avatar" src="normal.png" alt="Avatar">
        <div class="hud-info">
            <div class="hud-name">MEKANIK BRENDON</div>
            <div id="health">❤️❤️❤️</div>
        </div>
    </div>
</div>

<div id="custom-popup" class="popup-overlay hidden">
    <div class="box popup-box">
        <p id="popup-text"></p>
        <button id="popup-btn" style="font-size: 12px; width: 100%;">OKE</button>
    </div>
</div>

<script>
    let health = 3;
    let currentStage = 0;
    let availableTiles = [0,1,2,3,4,5,6,7];
    let isShowingStory = false;
    let audioBGM, audioCorrect, audioWrong, audioSiren;

    const assetsToLoad = [
        { id: 'sirenPic', type: 'image', src: 'siren.png' },
        { id: 'normalPic', type: 'image', src: 'normal.png' },
        { id: 'happyPic', type: 'image', src: 'happy.png' },
        { id: 'sadPic', type: 'image', src: 'sad.png' },
        { id: 'winPic', type: 'image', src: 'win.png' },
        { id: 'bgm', type: 'audio', src: 'bgm.mp3' },
        { id: 'correct', type: 'audio', src: 'correct.mp3' },
        { id: 'wrong', type: 'audio', src: 'wrong.mp3' },
        { id: 'sirenSfx', type: 'audio', src: 'siren-sfx.mp3' }
    ];

    let loadedCount = 0;
    let preloaderFinished = false;

    function updateAvatar(mood) {
        const avatar = document.getElementById('avatar');
        if(mood === 'happy') avatar.src = 'happy.png';
        else if(mood === 'sad') avatar.src = 'sad.png';
        else if(mood === 'win') avatar.src = 'win.png';
        else avatar.src = 'normal.png';
    }

    function trackProgress() {
        if (preloaderFinished) return;
        loadedCount++;
        let p = Math.floor((loadedCount / assetsToLoad.length) * 100);
        document.getElementById('loading-bar-fill').style.width = (p > 100 ? 100 : p) + '%';
        document.getElementById('loading-text').innerText = `LOADING... ${p}%`;
        if (loadedCount >= assetsToLoad.length) { preloaderFinished = true; setTimeout(showStartMenu, 600); }
    }

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => { if (!preloaderFinished) { preloaderFinished = true; showStartMenu(); } }, 4000);
        assetsToLoad.forEach(a => {
            if (a.type === 'image') { const i = new Image(); i.onload = trackProgress; i.onerror = trackProgress; i.src = a.src; }
            else if (a.type === 'audio') { const au = new Audio(); au.preload = 'auto'; au.addEventListener('loadedmetadata', trackProgress, {once:true}); au.addEventListener('error', trackProgress, {once:true}); au.src = a.src; au.load(); if(a.id==='bgm'){audioBGM=au; audioBGM.loop=true;} if(a.id==='correct')audioCorrect=au; if(a.id==='wrong')audioWrong=au; if(a.id==='sirenSfx')audioSiren=au; }
        });
    });

    function showStartMenu() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('start-menu').classList.remove('hidden');
    }

    const container = document.getElementById('puzzle-container');
    for(let i=0; i<8; i++) {
        let tile = document.createElement('div');
        tile.className = 'tile'; tile.id = 'tile-' + i;
        tile.style.backgroundPosition = `${(i%4)*33.33}% ${Math.floor(i/4)*100}%`;
        container.appendChild(tile);
    }

    const quiz = [
        { q: "1. Berapa umur Brendon hari ini ?", options: ["6", "5", "7", "8"], correct: 0, story: "Brendon memulai perjalanan! Di depan gerbang markas, dia menemukan petunjuk pertama.", storyImg: "1.png" },
        { q: "2. Daun Singkong warnanya?", options: ["Hijau", "Merah", "Biru", "Hitam"], correct: 0, story: "Hebat! Gerbang terbuka. Brendon melihat sebuah mesin aneh yang kabelnya putus.", storyImg: "2.png" },
        { q: "3. 5 - 2 = ?", options: ["2", "3", "4", "1"], correct: 1, story: "Listrik menyala! Terdengar suara gemuruh dari lorong sebelah kanan.", storyImg: "3.png" },
        { q: "4. Suara kucing?", options: ["Guk", "Meong", "Kukuruyuk", "Mbek"], correct: 1, story: "Ternyata itu robot kucing penjaga yang ramah! Dia memberikan kunci emas.", storyImg: "4.png" },
        { q: "5. Kendaraan terbang?", options: ["Mobil", "Sepeda", "Pesawat", "Becak"], correct: 2, story: "Kunci itu membuka pintu laboratorium rahasia.", storyImg: "5.png" },
        { q: "6. 5 + 5 = ?", options: ["8", "9", "10", "11"], correct: 2, story: "Sandi diterima! Layar komputer menampilkan peta lokasi Siren.", storyImg: "6.png" },
        { q: "7. Bersinar malam hari?", options: ["Bintang", "Awan", "Pohon", "Tanah"], correct: 0, story: "Hampir sampai! Brendon Menekan tombol utama aktivasi Siren!", storyImg: "7.png" },
        { q: "8. Alat untuk mencium?", options: ["Mata", "Telinga", "Hidung", "Mulut"], correct: 2, story: "Tombol ditekan! Siren berfungsi normal dan misi berhasil!", storyImg: "8.png" }
    ];

    function showPopup(text, btnText, callback) {
        const popup = document.getElementById('custom-popup');
        document.getElementById('popup-text').innerText = text;
        const btn = document.getElementById('popup-btn');
        btn.innerText = btnText;
        popup.classList.remove('hidden');
        setTimeout(() => popup.classList.add('show'), 10);
        btn.onclick = () => { popup.classList.remove('show'); setTimeout(() => popup.classList.add('hidden'), 300); if(callback) callback(); };
    }

    function showMissionBriefing() {
        const sTxt = document.getElementById('story-text');
        const cDiv = document.getElementById('choices');
        sTxt.innerText = "BRENDON! Misi penyelamatan Siren telah dimulai. Fokus dan gunakan kecerdasanmu untuk membuka kunci misterius ini. Apakah kamu siap?";
        cDiv.innerHTML = "<button class='action-btn' style='grid-column: span 2;' onclick='showStage()'>MULAI MISI!</button>";
    }

    function startGame() {
        if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        if(audioBGM) audioBGM.play();
        document.getElementById('start-menu').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('hud-screen').classList.remove('hidden');
        showMissionBriefing();
    }

    function showStage() {
        const sTxt = document.getElementById('story-text');
        const cDiv = document.getElementById('choices');
        const imgH = document.getElementById('story-image-holder');
        
        sTxt.classList.remove('fade-in'); cDiv.classList.remove('fade-in'); imgH.classList.remove('fade-in');
        void sTxt.offsetWidth; 

        if(currentStage >= quiz.length) {
            if(audioBGM) audioBGM.pause(); if(audioSiren) audioSiren.play();
            
            // Menampilkan gambar terakhir tanpa menghilangkan kontainer
            imgH.classList.remove('hidden');
            imgH.innerHTML = `<img src="${quiz[currentStage-1].storyImg}" alt="Scene">`;
            
            updateAvatar('win');
            document.getElementById('hud-screen').classList.add('win-mode');
            sTxt.classList.add('fade-in', 'win-glow');
            sTxt.innerText = "SEMUA SIREN BERBUNYI! Selamat Ulang Tahun ke-6, Brendon!";
            cDiv.innerHTML = "<button class='fade-in' style='grid-column: span 2;' onclick='location.reload()'>MAIN LAGI</button>";
            return;
        }

        if(isShowingStory) {
            imgH.classList.remove('hidden', 'fade-in'); imgH.offsetHeight; imgH.classList.add('fade-in');
            imgH.innerHTML = `<img src="${quiz[currentStage-1].storyImg}" alt="Scene">`;
            sTxt.innerText = quiz[currentStage-1].story;
            cDiv.innerHTML = `<button class="action-btn fade-in" style="grid-column: span 2;" onclick="isShowingStory=false; showStage();">LANJUT ➔</button>`;
        } else {
            imgH.classList.add('hidden');
            sTxt.innerText = quiz[currentStage].q;
            cDiv.innerHTML = "";
            quiz[currentStage].options.forEach((opt, i) => {
                let btn = document.createElement("button"); btn.innerText = opt;
                btn.onclick = () => {
                    if(i === quiz[currentStage].correct) {
                        if(audioCorrect) {
                            audioCorrect.currentTime = 0; 
                            audioCorrect.play();
                        }
                        updateAvatar('happy');
                        document.getElementById('avatar').classList.add('avatar-bounce');
                        setTimeout(() => document.getElementById('avatar').classList.remove('avatar-bounce'), 400);
                        
                        document.getElementById('tile-' + availableTiles.shift()).classList.add('revealed');
                        currentStage++; isShowingStory = true;
                        setTimeout(() => { updateAvatar('normal'); showStage(); }, 500);
                    } else {
                        if(audioWrong) audioWrong.play();
                        updateAvatar('sad');
                        health--; document.getElementById('health').innerText = health > 0 ? "❤️".repeat(health) : "💔";
                        if(health <= 0) { showPopup("Game Over, Brendon!", "ULANG", () => location.reload()); }
                        else { 
                            document.getElementById('game-screen').classList.add('shake-anim'); 
                            setTimeout(()=> { document.getElementById('game-screen').classList.remove('shake-anim'); updateAvatar('normal'); }, 400); 
                        }
                    }
                };
                cDiv.appendChild(btn);
            });
        }
    }
</script>
</body>
</html>
